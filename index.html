<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kartvizit Tarayıcı</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;padding:16px;background:#f5f5f5;color:#111;max-width:600px;margin:0 auto}
h1{font-size:18px;font-weight:600;margin-bottom:4px}
.sub{font-size:13px;color:#666;margin-bottom:16px}
#upload-btn{width:100%;padding:24px 16px;border:2px dashed #ccc;border-radius:14px;background:#fff;cursor:pointer;text-align:center;display:block;margin-bottom:16px}
#upload-btn span{display:block;font-size:14px;font-weight:500;margin-top:8px}
#upload-btn small{font-size:12px;color:#888}
#file-input{display:none}
.qwrap{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:10px 14px;margin-bottom:12px}
.qitem{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid #eee}
.qitem:last-child{border-bottom:none}
#all-btn{display:none;width:100%;padding:12px;background:#d1fae5;color:#065f46;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:12px}
.card{background:#fff;border-radius:14px;border:1px solid #e5e5e5;margin-bottom:12px;overflow:hidden}
.card-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
.avatar{width:36px;height:36px;border-radius:50%;background:#dbeafe;color:#1e40af;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.card-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-sub{font-size:12px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chevron{margin-left:auto;font-size:20px;color:#aaa;flex-shrink:0;transition:transform .2s}
.chevron.open{transform:rotate(90deg)}
.rm-btn{background:none;border:none;font-size:20px;color:#aaa;cursor:pointer;padding:4px;flex-shrink:0}
.card-body{padding:0 14px 14px;display:none}
.card-body.open{display:block}
.field{margin-bottom:8px}
.field label{font-size:11px;color:#888;display:block;margin-bottom:2px}
.field input{width:100%;padding:8px 10px;border:1px solid #e5e5e5;border-radius:8px;font-size:13px;background:#fafafa;color:#111}
.save-btn{width:100%;padding:10px;background:#dbeafe;color:#1e40af;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:999}
.overlay.show{display:flex}
.overlay-box{background:#fff;border-radius:16px;padding:24px 32px;text-align:center;min-width:200px}
.spinner{width:32px;height:32px;border:3px solid #e5e5e5;border-top-color:#3b82f6;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* API Key ekranı */
#key-screen{background:#fff;border-radius:14px;padding:20px;margin-bottom:16px;border:1px solid #e5e5e5}
#key-screen h2{font-size:15px;font-weight:600;margin-bottom:6px}
#key-screen p{font-size:12px;color:#666;margin-bottom:12px}
#key-input{width:100%;padding:9px 12px;border:1px solid #e5e5e5;border-radius:8px;font-size:13px;margin-bottom:8px}
#key-btn{width:100%;padding:10px;background:#3b82f6;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}
#key-ok{color:#059669;font-size:13px;font-weight:500;display:none;margin-top:6px}
#change-key{font-size:12px;color:#3b82f6;background:none;border:none;cursor:pointer;margin-top:4px;text-decoration:underline}
</style>
</head>
<body>

<h1>📇 Kartvizit Tarayıcı</h1>
<p class="sub">Fotoğraf yükle → düzenle → .vcf kaydet</p>

<!-- API Key girişi -->
<div id="key-screen">
  <h2>🔑 Anthropic API Anahtarı</h2>
  <p>Kartvizit okuma için Anthropic API anahtarı gerekli. Anahtar yalnızca tarayıcında saklanır, hiçbir yere gönderilmez.<br>
  <a href="https://console.anthropic.com/account/keys" target="_blank" style="color:#3b82f6">console.anthropic.com</a> adresinden alabilirsin.</p>
  <input id="key-input" type="password" placeholder="sk-ant-..." autocomplete="off">
  <button id="key-btn" onclick="saveKey()">Anahtarı Kaydet</button>
  <div id="key-ok">✓ Anahtar kaydedildi <button id="change-key" onclick="changeKey()">Değiştir</button></div>
</div>

<label id="upload-btn">
  📷
  <span>Fotoğraf Seç veya Çek</span>
  <small>Galeriden veya kamera • Çoklu seçim desteklenir</small>
  <input id="file-input" type="file" accept="image/*" multiple>
</label>

<div id="queue-wrap" style="display:none" class="qwrap">
  <div id="queue"></div>
</div>

<button id="all-btn" onclick="downloadAll()">⬇ Tümünü İndir (.vcf)</button>
<div id="cards"></div>

<div class="overlay" id="overlay">
  <div class="overlay-box">
    <div class="spinner"></div>
    <div id="overlay-text" style="font-size:14px;font-weight:500">Taranıyor...</div>
  </div>
</div>

<script>
const FIELDS = [
  {k:"firstName",l:"Ad"},{k:"lastName",l:"Soyad"},{k:"title",l:"Unvan"},
  {k:"company",l:"Şirket"},{k:"phone",l:"Telefon"},{k:"phone2",l:"Telefon 2"},
  {k:"email",l:"E-posta"},{k:"website",l:"Web Sitesi"},{k:"address",l:"Adres"}
];

let contacts = [];
let apiKey = localStorage.getItem("anthropic_key") || "";

// --- API Key yönetimi ---
function initKeyScreen() {
  if (apiKey) {
    document.getElementById("key-input").value = apiKey;
    document.getElementById("key-ok").style.display = "block";
    document.getElementById("key-btn").style.display = "none";
    document.getElementById("key-input").style.display = "none";
  }
}

function saveKey() {
  const val = document.getElementById("key-input").value.trim();
  if (!val.startsWith("sk-")) { alert("Geçerli bir Anthropic API anahtarı girin (sk- ile başlamalı)"); return; }
  apiKey = val;
  localStorage.setItem("anthropic_key", apiKey);
  document.getElementById("key-ok").style.display = "block";
  document.getElementById("key-btn").style.display = "none";
  document.getElementById("key-input").style.display = "none";
}

function changeKey() {
  apiKey = "";
  localStorage.removeItem("anthropic_key");
  document.getElementById("key-ok").style.display = "none";
  document.getElementById("key-btn").style.display = "block";
  document.getElementById("key-input").style.display = "block";
  document.getElementById("key-input").value = "";
}

initKeyScreen();

// --- Dosya yükleme ---
document.getElementById("file-input").addEventListener("change", function(e) {
  const files = Array.from(e.target.files).filter(f => f.type.startsWith("image/"));
  if (!files.length) return;
  if (!apiKey) { alert("Önce API anahtarını girin."); return; }
  processFiles(files);
  e.target.value = "";
});

async function processFiles(files) {
  const overlay = document.getElementById("overlay");
  const overlayText = document.getElementById("overlay-text");
  overlay.classList.add("show");

  const qWrap = document.getElementById("queue-wrap");
  const qEl = document.getElementById("queue");
  qWrap.style.display = "block";
  qEl.innerHTML = "";

  const items = files.map(f => {
    const d = document.createElement("div");
    d.className = "qitem";
    d.innerHTML = `<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:75%">${esc(f.name)}</span><span class="st">bekliyor</span>`;
    qEl.appendChild(d);
    return d;
  });

  for (let i = 0; i < files.length; i++) {
    overlayText.textContent = `Taranıyor ${i+1}/${files.length}...`;
    items[i].querySelector(".st").textContent = "taranıyor...";
    try {
      const c = await scanCard(files[i]);
      contacts.push(c);
      items[i].querySelector(".st").style.color = "#059669";
      items[i].querySelector(".st").textContent = "✓ tamam";
      addCard(c, contacts.length - 1);
    } catch(err) {
      items[i].querySelector(".st").style.color = "#dc2626";
      items[i].querySelector(".st").textContent = "hata";
    }
  }

  overlay.classList.remove("show");
  updateAllBtn();
  setTimeout(() => { qWrap.style.display = "none"; }, 3000);
}

// --- API çağrısı ---
async function scanCard(file) {
  const b64 = await toBase64(file);
  let resp, data;

  try {
    resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-calls": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 800,
        messages: [{
          role: "user",
          content: [
            {type:"image",source:{type:"base64",media_type:file.type||"image/jpeg",data:b64}},
            {type:"text",text:'Kartvizitteki tüm bilgileri çıkar. SADECE aşağıdaki JSON formatında döndür, başka hiçbir şey yazma:\n{"firstName":"","lastName":"","title":"","company":"","phone":"","phone2":"","email":"","website":"","address":""}'}
          ]
        }]
      })
    });
    data = await resp.json();
  } catch(e) {
    alert("Bağlantı hatası:\n" + e.message);
    throw e;
  }

  if (data.error) {
    alert("API hatası:\n" + data.error.type + ": " + data.error.message);
    throw new Error(data.error.message);
  }

  const raw = (data.content?.find(b=>b.type==="text")?.text||"{}").replace(/```[a-z]*/g,"").replace(/```/g,"").trim();
  try { return JSON.parse(raw); }
  catch(e) { alert("Yanıt parse hatası:\n" + raw.slice(0,300)); throw e; }
}

function toBase64(file) {
  return new Promise((res,rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

// --- Kart render ---
function addCard(c, idx) {
  const div = document.createElement("div");
  div.className = "card";
  div.id = "card-" + idx;
  renderCard(div, c, idx);
  document.getElementById("cards").appendChild(div);
}

function renderCard(div, c, idx) {
  const name = [c.firstName, c.lastName].filter(Boolean).join(" ") || "İsimsiz";
  const initials = [c.firstName?.[0], c.lastName?.[0]].filter(Boolean).join("").toUpperCase() || "?";
  const sub = c.company || c.title || "";
  const fields = FIELDS.map(f =>
    `<div class="field"><label>${f.l}</label><input value="${esc(c[f.k]||"")}" oninput="updateField(${idx},'${f.k}',this.value)"></div>`
  ).join("");

  div.innerHTML = `
    <div class="card-header" onclick="toggleCard(${idx})">
      <div class="avatar" id="av-${idx}">${esc(initials)}</div>
      <div style="min-width:0;flex:1">
        <div class="card-name" id="cn-${idx}">${esc(name)}</div>
        <div class="card-sub" id="cs-${idx}">${esc(sub)}</div>
      </div>
      <span class="chevron open" id="chev-${idx}">›</span>
      <button class="rm-btn" onclick="event.stopPropagation();removeCard(${idx})">×</button>
    </div>
    <div class="card-body open" id="body-${idx}">
      ${fields}
      <button class="save-btn" onclick="downloadOne(${idx})">⬇ Rehbere Kaydet (.vcf)</button>
    </div>`;
}

function toggleCard(idx) {
  document.getElementById("body-"+idx).classList.toggle("open");
  document.getElementById("chev-"+idx).classList.toggle("open");
}

function updateField(idx, key, val) {
  contacts[idx][key] = val;
  const c = contacts[idx];
  const name = [c.firstName, c.lastName].filter(Boolean).join(" ") || "İsimsiz";
  const initials = [c.firstName?.[0], c.lastName?.[0]].filter(Boolean).join("").toUpperCase() || "?";
  document.getElementById("cn-"+idx).textContent = name;
  document.getElementById("av-"+idx).textContent = initials;
  document.getElementById("cs-"+idx).textContent = c.company || c.title || "";
}

function removeCard(idx) {
  contacts[idx] = null;
  const el = document.getElementById("card-"+idx);
  if (el) el.remove();
  updateAllBtn();
}

function updateAllBtn() {
  const alive = contacts.filter(c => c !== null);
  const btn = document.getElementById("all-btn");
  btn.style.display = alive.length > 1 ? "block" : "none";
  btn.textContent = `⬇ Tümünü İndir — ${alive.length} kart (.vcf)`;
}

// --- VCF ---
function makeVCF(c) {
  const lines = ["BEGIN:VCARD","VERSION:3.0"];
  const fn = [c.firstName, c.lastName].filter(Boolean).join(" ");
  if (fn) lines.push("FN:"+fn);
  if (c.firstName||c.lastName) lines.push(`N:${c.lastName||""};${c.firstName||""};;;`);
  if (c.company) lines.push("ORG:"+c.company);
  if (c.title) lines.push("TITLE:"+c.title);
  if (c.phone) lines.push("TEL;TYPE=WORK,VOICE:"+c.phone);
  if (c.phone2) lines.push("TEL;TYPE=CELL,VOICE:"+c.phone2);
  if (c.email) lines.push("EMAIL;TYPE=INTERNET:"+c.email);
  if (c.website) lines.push("URL:"+c.website);
  if (c.address) lines.push("ADR;TYPE=WORK:;;"+c.address+";;;;");
  lines.push("END:VCARD");
  return lines.join("\r\n");
}

function triggerDownload(content, filename) {
  const blob = new Blob([content], {type:"text/vcard;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function downloadOne(idx) {
  const c = contacts[idx];
  const name = [c.firstName, c.lastName].filter(Boolean).join("_") || "kartvizit";
  triggerDownload(makeVCF(c), name+".vcf");
}

function downloadAll() {
  const alive = contacts.filter(c => c !== null);
  triggerDownload(alive.map(makeVCF).join("\r\n"), "kartvizitler.vcf");
}

function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
</script>
</body>
</html>
