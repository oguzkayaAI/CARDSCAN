<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kartvizit">
<meta name="theme-color" content="#ffffff">
<title>Kartvizit Tarayıcı</title>
<script src="https://accounts.google.com/gsi/client" async></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f2f2f7;color:#1c1c1e;min-height:100vh;padding-bottom:40px}
.header{background:#fff;padding:16px 20px 12px;border-bottom:1px solid #e5e5ea;position:sticky;top:0;z-index:10}
.header h1{font-size:20px;font-weight:700}
.header p{font-size:13px;color:#8e8e93;margin-top:2px}
.content{padding:16px}
.section{background:#fff;border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.section h2{font-size:15px;font-weight:600;margin-bottom:8px}
.section p{font-size:13px;color:#636366;line-height:1.5;margin-bottom:12px}

/* Google Login */
.google-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:13px;border:1.5px solid #e5e5ea;border-radius:12px;background:#fff;font-size:15px;font-weight:600;cursor:pointer;color:#1c1c1e}
.google-btn:active{background:#f2f2f7}
.google-btn img{width:20px;height:20px}
.user-info{display:flex;align-items:center;gap:10px}
.user-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover}
.user-name{font-size:14px;font-weight:500;flex:1}
.btn-link{background:none;border:none;color:#ff3b30;font-size:13px;cursor:pointer;padding:0}

/* Upload */
.upload-area{background:#fff;border-radius:16px;padding:28px 16px;text-align:center;border:2px dashed #c7c7cc;cursor:pointer;margin-bottom:16px}
.upload-area:active{background:#f2f2f7}
.upload-icon{font-size:40px;margin-bottom:8px}
.upload-area h3{font-size:16px;font-weight:600;margin-bottom:4px}
.upload-area p{font-size:13px;color:#8e8e93}
#file-input{display:none}

.btn-primary{width:100%;padding:14px;background:#007aff;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin-top:10px}
.btn-primary:active{opacity:.85}
.btn-success{width:100%;padding:14px;background:#34c759;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin-bottom:12px}
.btn-success:active{opacity:.85}

/* Queue */
.queue-wrap{background:#fff;border-radius:16px;padding:12px 16px;margin-bottom:12px;display:none}
.qitem{display:flex;justify-content:space-between;align-items:center;font-size:14px;padding:6px 0;border-bottom:1px solid #f2f2f7}
.qitem:last-child{border-bottom:none}
.qitem-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70%}
.qitem-status{font-size:13px;color:#8e8e93;flex-shrink:0}

/* Cards */
.card{background:#fff;border-radius:16px;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer}
.avatar{width:42px;height:42px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
.card-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-sub{font-size:13px;color:#8e8e93;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.chevron{margin-left:auto;color:#c7c7cc;font-size:20px;flex-shrink:0;transition:transform .2s}
.chevron.open{transform:rotate(90deg)}
.rm-btn{background:none;border:none;font-size:22px;color:#c7c7cc;cursor:pointer;padding:4px;line-height:1}
.card-body{padding:0 16px 16px;display:none;border-top:1px solid #f2f2f7}
.card-body.open{display:block}
.field{margin-top:10px}
.field label{font-size:12px;color:#8e8e93;display:block;margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.3px}
.field input{width:100%;padding:10px 12px;border:1px solid #e5e5ea;border-radius:10px;font-size:15px;background:#f9f9f9;color:#1c1c1e;-webkit-appearance:none;outline:none}
.field input:focus{border-color:#007aff;background:#fff}
.card-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.btn-drive{padding:12px;background:#e8f0fe;color:#1a73e8;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer}
.btn-vcf{padding:12px;background:#e8f5e9;color:#1b873f;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer}
.save-status{font-size:12px;color:#34c759;margin-top:6px;text-align:center;min-height:16px}

/* Overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(4px)}
.overlay.show{display:flex}
.overlay-box{background:#fff;border-radius:20px;padding:28px 36px;text-align:center;min-width:220px}
.spinner{width:36px;height:36px;border:3px solid #e5e5ea;border-top-color:#007aff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
.overlay-text{font-size:15px;font-weight:600}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="header">
  <h1>📇 Kartvizit Tarayıcı</h1>
  <p>Fotoğraf yükle • Düzenle • Drive'a kaydet</p>
</div>

<div class="content">

  <!-- Google Login -->
  <div class="section" id="login-section">
    <h2>Google Hesabı</h2>
    <p>Google Drive'a kaydetmek için giriş yap. Bir kez giriş yaptıktan sonra tekrar sormaz.</p>
    <div id="login-area">
      <button class="google-btn" onclick="signIn()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
        Google ile Giriş Yap
      </button>
    </div>
    <div id="user-area" style="display:none">
      <div class="user-info">
        <img class="user-avatar" id="user-avatar" src="" alt="">
        <span class="user-name" id="user-name"></span>
        <button class="btn-link" onclick="signOut()">Çıkış</button>
      </div>
    </div>
  </div>

  <!-- Upload -->
  <div class="upload-area" onclick="document.getElementById('file-input').click()">
    <div class="upload-icon">📷</div>
    <h3>Fotoğraf Seç veya Çek</h3>
    <p>Galeriden seç veya kamerayla çek<br>Birden fazla kart aynı anda yüklenebilir</p>
    <input id="file-input" type="file" accept="image/*" multiple>
  </div>

  <div class="queue-wrap" id="queue-wrap">
    <div id="queue"></div>
  </div>

  <button class="btn-success" id="all-btn" onclick="downloadAll()" style="display:none"></button>
  <div id="cards"></div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-box">
    <div class="spinner"></div>
    <div class="overlay-text" id="overlay-text">Taranıyor...</div>
  </div>
</div>

<script>
const CLIENT_ID = "629470119329-f70gvnbh79sdjcksl1oudt1lbj410ff1.apps.googleusercontent.com";
const GEMINI_KEY = "AIzaSyBGmpuvOgQmwxDw35jsPyvk9l2NRorBmb4";
const SCOPES = "https://www.googleapis.com/auth/drive.file profile email";
const FIELDS = [
  {k:"firstName",l:"Ad"},{k:"lastName",l:"Soyad"},{k:"title",l:"Unvan"},
  {k:"company",l:"Şirket"},{k:"phone",l:"Telefon"},{k:"phone2",l:"Telefon 2"},
  {k:"email",l:"E-posta"},{k:"website",l:"Web Sitesi"},{k:"address",l:"Adres"}
];
const COLORS = ["#007aff","#34c759","#ff9500","#af52de","#ff2d55","#5ac8fa"];

let contacts = [];
let accessToken = localStorage.getItem("g_access_token") || "";
let tokenClient;

// --- Google Auth ---
window.addEventListener("load", () => {
  if (typeof google === "undefined") {
    setTimeout(initGoogle, 1000);
  } else {
    initGoogle();
  }
});

function initGoogle() {
  if (typeof google === "undefined") return;
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: (resp) => {
      if (resp.error) { alert("Giriş hatası: " + resp.error); return; }
      accessToken = resp.access_token;
      localStorage.setItem("g_access_token", accessToken);
      fetchUserInfo();
    }
  });

  // Kaydedilmiş token varsa kullanıcı bilgisini çek
  if (accessToken) fetchUserInfo();
}

async function fetchUserInfo() {
  try {
    const resp = await fetch("https://www.googleapis.com/oauth2/v3/userinfo", {
      headers: { Authorization: "Bearer " + accessToken }
    });
    if (!resp.ok) { accessToken = ""; localStorage.removeItem("g_access_token"); showLoggedOut(); return; }
    const u = await resp.json();
    showLoggedIn(u.name, u.picture);
  } catch { showLoggedOut(); }
}

function showLoggedIn(name, pic) {
  document.getElementById("login-area").style.display = "none";
  document.getElementById("user-area").style.display = "block";
  document.getElementById("user-name").textContent = name;
  document.getElementById("user-avatar").src = pic;
}
function showLoggedOut() {
  document.getElementById("login-area").style.display = "block";
  document.getElementById("user-area").style.display = "none";
}
function signIn() {
  if (!tokenClient) { alert("Google henüz yüklenmedi, bir saniye bekleyip tekrar dene."); return; }
  tokenClient.requestAccessToken();
}
function signOut() {
  accessToken = "";
  localStorage.removeItem("g_access_token");
  showLoggedOut();
}

// --- File upload ---
document.getElementById("file-input").addEventListener("change", function(e) {
  const files = Array.from(e.target.files).filter(f => f.type.startsWith("image/"));
  if (!files.length) return;
  processFiles(files);
  e.target.value = "";
});

async function processFiles(files) {
  const overlay = document.getElementById("overlay");
  const overlayText = document.getElementById("overlay-text");
  overlay.classList.add("show");
  const qWrap = document.getElementById("queue-wrap");
  const qEl = document.getElementById("queue");
  qWrap.style.display = "block"; qEl.innerHTML = "";
  const items = files.map(f => {
    const d = document.createElement("div"); d.className = "qitem";
    d.innerHTML = `<span class="qitem-name">${esc(f.name)}</span><span class="qitem-status">bekliyor</span>`;
    qEl.appendChild(d); return d;
  });
  for (let i = 0; i < files.length; i++) {
    overlayText.textContent = `Taranıyor ${i+1}/${files.length}...`;
    items[i].querySelector(".qitem-status").textContent = "⏳";
    try {
      const c = await scanCard(files[i]);
      contacts.push(c);
      items[i].querySelector(".qitem-status").style.color = "#34c759";
      items[i].querySelector(".qitem-status").textContent = "✓";
      addCard(c, contacts.length - 1);
    } catch {
      items[i].querySelector(".qitem-status").style.color = "#ff3b30";
      items[i].querySelector(".qitem-status").textContent = "hata";
    }
  }
  overlay.classList.remove("show");
  updateAllBtn();
  setTimeout(() => { qWrap.style.display = "none"; }, 3000);
}

// --- Gemini API ---
async function scanCard(file) {
  const b64 = await toBase64(file);
  const mimeType = file.type || "image/jpeg";
  let resp, data;
  try {
    resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{
          parts: [
            { inline_data: { mime_type: mimeType, data: b64 } },
            { text: 'Kartvizitteki tüm bilgileri çıkar. SADECE JSON döndür, başka hiçbir şey yazma:\n{"firstName":"","lastName":"","title":"","company":"","phone":"","phone2":"","email":"","website":"","address":""}' }
          ]
        }]
      })
    });
    data = await resp.json();
  } catch(e) { alert("Bağlantı hatası:\n" + e.message); throw e; }

  if (data.error) { alert("Gemini hatası:\n" + data.error.message); throw new Error(data.error.message); }

  const raw = (data.candidates?.[0]?.content?.parts?.[0]?.text || "{}")
    .replace(/```[a-z]*/g, "").replace(/```/g, "").trim();
  try { return JSON.parse(raw); }
  catch(e) { alert("Yanıt hatası:\n" + raw.slice(0, 200)); throw e; }
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = rej; r.readAsDataURL(file);
  });
}

// --- Card render ---
function addCard(c, idx) {
  const div = document.createElement("div"); div.className = "card"; div.id = "card-" + idx;
  renderCard(div, c, idx);
  document.getElementById("cards").appendChild(div);
}

function renderCard(div, c, idx) {
  const name = [c.firstName, c.lastName].filter(Boolean).join(" ") || "İsimsiz";
  const initials = [c.firstName?.[0], c.lastName?.[0]].filter(Boolean).join("").toUpperCase() || "?";
  const sub = c.company || c.title || "";
  const color = COLORS[idx % COLORS.length];
  const fields = FIELDS.map(f =>
    `<div class="field"><label>${f.l}</label><input value="${esc(c[f.k]||"")}" oninput="updateField(${idx},'${f.k}',this.value)"></div>`
  ).join("");
  div.innerHTML = `
    <div class="card-header" onclick="toggleCard(${idx})">
      <div class="avatar" id="av-${idx}" style="background:${color}">${esc(initials)}</div>
      <div style="min-width:0;flex:1">
        <div class="card-name" id="cn-${idx}">${esc(name)}</div>
        <div class="card-sub" id="cs-${idx}">${esc(sub)}</div>
      </div>
      <span class="chevron open" id="chev-${idx}">›</span>
      <button class="rm-btn" onclick="event.stopPropagation();removeCard(${idx})">×</button>
    </div>
    <div class="card-body open" id="body-${idx}">
      ${fields}
      <div class="card-actions">
        <button class="btn-drive" onclick="saveToDrive(${idx})">☁️ Drive'a Kaydet</button>
        <button class="btn-vcf" onclick="downloadOne(${idx})">⬇ .vcf İndir</button>
      </div>
      <div class="save-status" id="status-${idx}"></div>
    </div>`;
}

function toggleCard(idx) {
  document.getElementById("body-" + idx).classList.toggle("open");
  document.getElementById("chev-" + idx).classList.toggle("open");
}
function updateField(idx, key, val) {
  contacts[idx][key] = val;
  const c = contacts[idx];
  const name = [c.firstName, c.lastName].filter(Boolean).join(" ") || "İsimsiz";
  const initials = [c.firstName?.[0], c.lastName?.[0]].filter(Boolean).join("").toUpperCase() || "?";
  document.getElementById("cn-" + idx).textContent = name;
  document.getElementById("av-" + idx).textContent = initials;
  document.getElementById("cs-" + idx).textContent = c.company || c.title || "";
}
function removeCard(idx) {
  contacts[idx] = null;
  const el = document.getElementById("card-" + idx); if (el) el.remove();
  updateAllBtn();
}
function updateAllBtn() {
  const alive = contacts.filter(c => c !== null);
  const btn = document.getElementById("all-btn");
  btn.style.display = alive.length > 1 ? "block" : "none";
  btn.textContent = `⬇ Tümünü İndir — ${alive.length} kart (.vcf)`;
}

// --- VCF ---
function makeVCF(c) {
  const lines = ["BEGIN:VCARD", "VERSION:3.0"];
  const fn = [c.firstName, c.lastName].filter(Boolean).join(" ");
  if (fn) lines.push("FN:" + fn);
  if (c.firstName || c.lastName) lines.push(`N:${c.lastName||""};${c.firstName||""};;;`);
  if (c.company) lines.push("ORG:" + c.company);
  if (c.title) lines.push("TITLE:" + c.title);
  if (c.phone) lines.push("TEL;TYPE=WORK,VOICE:" + c.phone);
  if (c.phone2) lines.push("TEL;TYPE=CELL,VOICE:" + c.phone2);
  if (c.email) lines.push("EMAIL;TYPE=INTERNET:" + c.email);
  if (c.website) lines.push("URL:" + c.website);
  if (c.address) lines.push("ADR;TYPE=WORK:;;" + c.address + ";;;;");
  lines.push("END:VCARD");
  return lines.join("\r\n");
}

function triggerDownload(content, filename) {
  const blob = new Blob([content], { type: "text/vcard;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
function downloadOne(idx) {
  const c = contacts[idx];
  const name = [c.firstName, c.lastName].filter(Boolean).join("_") || "kartvizit";
  triggerDownload(makeVCF(c), name + ".vcf");
}
function downloadAll() {
  const alive = contacts.filter(c => c !== null);
  triggerDownload(alive.map(makeVCF).join("\r\n"), "kartvizitler.vcf");
}

// --- Google Drive ---
async function saveToDrive(idx) {
  if (!accessToken) { alert("Önce Google ile giriş yap."); return; }
  const c = contacts[idx];
  const name = [c.firstName, c.lastName].filter(Boolean).join("_") || "kartvizit";
  const filename = name + ".vcf";
  const vcf = makeVCF(c);
  const statusEl = document.getElementById("status-" + idx);
  statusEl.textContent = "Yükleniyor...";
  statusEl.style.color = "#8e8e93";

  try {
    // Klasör oluştur/bul
    const folderId = await getOrCreateFolder();

    // Dosyayı yükle
    const metadata = { name: filename, mimeType: "text/vcard", parents: [folderId] };
    const form = new FormData();
    form.append("metadata", new Blob([JSON.stringify(metadata)], { type: "application/json" }));
    form.append("file", new Blob([vcf], { type: "text/vcard" }));

    const resp = await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart", {
      method: "POST",
      headers: { Authorization: "Bearer " + accessToken },
      body: form
    });

    if (resp.status === 401) {
      accessToken = ""; localStorage.removeItem("g_access_token"); showLoggedOut();
      alert("Oturum süresi doldu, tekrar giriş yap."); return;
    }

    if (!resp.ok) { const e = await resp.json(); throw new Error(e.error?.message || "Hata"); }

    statusEl.textContent = "✓ Drive'a kaydedildi";
    statusEl.style.color = "#34c759";
  } catch(e) {
    statusEl.textContent = "✗ Hata: " + e.message;
    statusEl.style.color = "#ff3b30";
  }
}

async function getOrCreateFolder() {
  // "Kartvizitler" klasörünü ara
  const searchResp = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=name%3D'Kartvizitler'+and+mimeType%3D'application%2Fvnd.google-apps.folder'+and+trashed%3Dfalse&fields=files(id)`,
    { headers: { Authorization: "Bearer " + accessToken } }
  );
  const searchData = await searchResp.json();
  if (searchData.files?.length > 0) return searchData.files[0].id;

  // Yoksa oluştur
  const createResp = await fetch("https://www.googleapis.com/drive/v3/files", {
    method: "POST",
    headers: { Authorization: "Bearer " + accessToken, "Content-Type": "application/json" },
    body: JSON.stringify({ name: "Kartvizitler", mimeType: "application/vnd.google-apps.folder" })
  });
  const folder = await createResp.json();
  return folder.id;
}

function esc(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
</script>
</body>
</html>
